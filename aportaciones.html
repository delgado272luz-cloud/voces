<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enviar Reporte | Voces Ancestrales</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Metal+Mania&family=Oswald:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --rojo: #ff0000;
            --negro: #080808;
            --gris-interrogatorio: #1a1a1a;
            --blanco: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--negro);
            color: var(--blanco);
            font-family: 'Oswald', sans-serif;
            background-image: radial-gradient(circle, #220000 0%, #080808 100%);
            min-height: 100vh;
            /* Evitamos que el humo cree barras de scroll */
            overflow-x: hidden;
            position: relative;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: #000;
            border-bottom: 3px solid var(--rojo);
            position: relative;
            z-index: 100; /* Por encima de la niebla */
        }

        .logo { font-family: 'Permanent Marker', cursive; font-size: 1.8rem; text-decoration: none; color: white; }
        .logo span { color: var(--rojo); }

        .contenedor-form {
            max-width: 700px;
            margin: 50px auto;
            padding: 40px;
            background: var(--gris-interrogatorio);
            border: 1px solid #333;
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,1);
            z-index: 100; /* Asegura que el cuadro esté sobre el humo */
        }

        .contenedor-form::before {
            content: "TOP SECRET";
            position: absolute;
            top: 20px;
            right: 20px;
            border: 3px solid var(--rojo);
            color: var(--rojo);
            padding: 5px 10px;
            font-weight: bold;
            transform: rotate(15deg);
            opacity: 0.5;
            font-size: 1.2rem;
        }

        h1 {
            font-family: 'Metal Mania';
            color: var(--rojo);
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 10px;
        }

        p.instruccion {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 2px;
        }

        .campo { margin-bottom: 25px; }

        label {
            display: block;
            color: var(--rojo);
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid #444;
            color: white;
            font-family: 'Oswald';
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--rojo);
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.2);
        }

        .btn-enviar {
            width: 100%;
            padding: 15px;
            background: var(--rojo);
            color: white;
            border: none;
            font-family: 'Oswald';
            font-weight: bold;
            font-size: 1.2rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-enviar:hover {
            background: white;
            color: black;
            letter-spacing: 2px;
        }

        .advertencia {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #555;
            text-align: center;
            border-top: 1px solid #333;
            padding-top: 20px;
        }

        /* ESTILOS PARA EL HUMO/NIEBLA */
        .particula-humo {
            position: fixed;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, rgba(100,100,100,0.05) 40%, transparent 70%);
            border-radius: 50%;
            pointer-events: none; /* No interfiere con los clics */
            z-index: 1; /* Por debajo del formulario */
            filter: blur(20px);
            animation: flotarHumo 15s infinite linear;
        }

        @keyframes flotarHumo {
            0% { transform: translate(0, 0) scale(1); opacity: 0; }
            20% { opacity: 0.4; }
            80% { opacity: 0.4; }
            100% { transform: translate(100px, -100px) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">VOCES <span>ANCESTRALES</span></a>
    </nav>

    <div class="contenedor-form">
        <h1>REPORTE DE SUCESOS</h1>
        <p class="instruccion">Documente su experiencia para el archivo</p>

        <form action="https://formspree.io/f/xgorzeej" method="POST">
            
            <div class="campo">
                <label>Nombre del Informante (o Alias)</label>
                <input type="text" name="nombre" placeholder="Ej: Agente X / Anónimo" required>
            </div>

            <div class="campo">
                <label>Correo de Contacto</label>
                <input type="email" name="email" placeholder="su-correo@ejemplo.com" required>
            </div>

            <div class="campo">
                <label>Tipo de Fenómeno</label>
                <select name="categoria">
                    <option value="aparicion">Aparición Espectral</option>
                    <option value="leyenda">Leyenda Local</option>
                    <option value="criatura">Criatura no identificada</option>
                    <option value="otro">Otro suceso inexplicable</option>
                </select>
            </div>

            <div class="campo">
                <label>Relato de los Hechos</label>
                <textarea name="mensaje" rows="6" placeholder="Describa lugar, hora y lo que presenció..." required></textarea>
            </div>

            <button type="submit" class="btn-enviar">REGISTRAR EN EL ARCHIVO</button>

        </form>

        <div class="advertencia">
            AL ENVIAR ESTE FORMULARIO, USTED ACEPTA QUE SU HISTORIA SEA PUBLICADA EN NUESTROS EXPEDIENTES BAJO SU ALIAS.
        </div>
    </div>

    <script>
        function crearNiebla() {
            const numeroParticulas = 15; // Cantidad de nubes de humo
            
            for (let i = 0; i < numeroParticulas; i++) {
                const humo = document.createElement('div');
                humo.className = 'particula-humo';
                
                // Tamaño aleatorio para las nubes
                const tamaño = Math.random() * 300 + 200;
                humo.style.width = tamaño + 'px';
                humo.style.height = tamaño + 'px';
                
                // Posición inicial aleatoria
                humo.style.left = Math.random() * 100 + 'vw';
                humo.style.top = Math.random() * 100 + 'vh';
                
                // Retraso aleatorio para que no salgan todas al mismo tiempo
                humo.style.animationDelay = Math.random() * 15 + 's';
                
                // Velocidad aleatoria
                humo.style.animationDuration = (Math.random() * 10 + 10) + 's';

                document.body.appendChild(humo);
            }
        }

        // Ejecutar la función al cargar la página
        window.onload = crearNiebla;
    </script>

</body>
</html>
