<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enviar Reporte | Voces Ancestrales</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Metal+Mania&family=Oswald:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --rojo: #ff0000;
            --negro: #080808;
            --gris-interrogatorio: #1a1a1a;
            --blanco: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--negro);
            color: var(--blanco);
            font-family: 'Oswald', sans-serif;
            background-image: radial-gradient(circle, #220000 0%, #080808 100%);
            min-height: 100vh;
            overflow: hidden; /* Evita scroll por el humo */
            position: relative;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: #000;
            border-bottom: 3px solid var(--rojo);
            position: relative;
            z-index: 1000;
        }

        .logo { font-family: 'Permanent Marker', cursive; font-size: 1.8rem; text-decoration: none; color: white; }
        .logo span { color: var(--rojo); }

        .contenedor-form {
            max-width: 700px;
            margin: 40px auto;
            padding: 40px;
            background: rgba(26, 26, 26, 0.9); /* Un poco transparente para ver el humo pasar tras él */
            border: 1px solid #333;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,1);
            z-index: 1000;
        }

        .contenedor-form::before {
            content: "TOP SECRET";
            position: absolute;
            top: 20px; right: 20px;
            border: 3px solid var(--rojo);
            color: var(--rojo);
            padding: 5px 10px;
            font-weight: bold;
            transform: rotate(15deg);
            opacity: 0.5;
            font-size: 1.2rem;
        }

        h1 { font-family: 'Metal Mania'; color: var(--rojo); font-size: 2.5rem; text-align: center; margin-bottom: 10px; }
        p.instruccion { text-align: center; color: #888; margin-bottom: 30px; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 2px; }

        .campo { margin-bottom: 20px; }
        label { display: block; color: var(--rojo); text-transform: uppercase; font-weight: bold; margin-bottom: 8px; font-size: 0.9rem; }
        input, textarea, select { width: 100%; padding: 12px; background: #000; border: 1px solid #444; color: white; font-family: 'Oswald'; }

        .btn-enviar {
            width: 100%; padding: 15px; background: var(--rojo); color: white; border: none;
            font-family: 'Oswald'; font-weight: bold; font-size: 1.2rem; text-transform: uppercase;
            cursor: pointer; transition: 0.3s;
        }
        .btn-enviar:hover { background: white; color: black; letter-spacing: 2px; }

        /* --- EFECTO DE HUMO AVANZADO --- */
        #capa-niebla {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particula-humo {
            position: absolute;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, rgba(150,150,150,0.1) 40%, transparent 70%);
            border-radius: 50%;
            filter: blur(50px);
            opacity: 0;
            animation: movimientoHumo var(--duracion) infinite ease-in-out;
        }

        @keyframes movimientoHumo {
            0% {
                transform: translate(0, 0) rotate(0deg) scale(1);
                opacity: 0;
            }
            20% { opacity: var(--max-opacidad); }
            50% {
                transform: translate(var(--mov-x), var(--mov-y)) rotate(180deg) scale(1.5);
            }
            80% { opacity: var(--max-opacidad); }
            100% {
                transform: translate(calc(var(--mov-x) * 1.5), calc(var(--mov-y) * 1.5)) rotate(360deg) scale(2);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div id="capa-niebla"></div>

    <nav>
        <a href="index.html" class="logo">VOCES <span>ANCESTRALES</span></a>
    </nav>

    <div class="contenedor-form">
        <h1>REPORTE DE SUCESOS</h1>
        <p class="instruccion">Documente su experiencia para el archivo</p>

        <form action="https://formspree.io/f/xgorzeej" method="POST">
            <div class="campo">
                <label>Nombre del Informante</label>
                <input type="text" name="nombre" placeholder="Ej: Agente X" required>
            </div>
            <div class="campo">
                <label>Correo de Contacto</label>
                <input type="email" name="email" required>
            </div>
            <div class="campo">
                <label>Tipo de Fenómeno</label>
                <select name="categoria">
                    <option value="aparicion">Aparición Espectral</option>
                    <option value="leyenda">Leyenda Local</option>
                    <option value="criatura">Criatura no identificada</option>
                    <option value="otro">Otro suceso inexplicable</option>
                </select>
            </div>
            <div class="campo">
                <label>Relato de los Hechos</label>
                <textarea name="mensaje" rows="5" placeholder="Describa lo que presenció..." required></textarea>
            </div>
            <button type="submit" class="btn-enviar">REGISTRAR EN EL ARCHIVO</button>
        </form>
    </div>

    <script>
        const capa = document.getElementById('capa-niebla');
        const cantidadParticulas = 60; // ¡Mucho más denso!

        for (let i = 0; i < cantidadParticulas; i++) {
            const humo = document.createElement('div');
            humo.className = 'particula-humo';
            
            // Tamaños masivos para cubrir todo
            const tamaño = Math.random() * 600 + 400;
            humo.style.width = tamaño + 'px';
            humo.style.height = tamaño + 'px';
            
            // Posición inicial aleatoria
            humo.style.left = Math.random() * 110 - 10 + 'vw';
            humo.style.top = Math.random() * 110 - 10 + 'vh';
            
            // Variables personalizadas para la animación de "humo"
            humo.style.setProperty('--duracion', Math.random() * 15 + 10 + 's');
            humo.style.setProperty('--mov-x', (Math.random() * 400 - 200) + 'px');
            humo.style.setProperty('--mov-y', (Math.random() * -300 - 100) + 'px');
            humo.style.setProperty('--max-opacidad', Math.random() * 0.4 + 0.2);
            
            humo.style.animationDelay = Math.random() * 20 + 's';

            capa.appendChild(humo);
        }
    </script>
</body>
</html>
