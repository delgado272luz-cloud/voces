<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enviar Reporte | Voces Ancestrales</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Metal+Mania&family=Oswald:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --rojo: #ff0000;
            --negro: #080808;
            --gris-interrogatorio: #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--negro);
            color: #fff;
            font-family: 'Oswald', sans-serif;
            background-image: radial-gradient(circle, #220000 0%, #080808 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: #000;
            border-bottom: 3px solid var(--rojo);
            position: relative;
            z-index: 100;
        }

        .logo { font-family: 'Permanent Marker', cursive; font-size: 1.8rem; text-decoration: none; color: white; }
        .logo span { color: var(--rojo); }

        .contenedor-form {
            max-width: 700px;
            margin: 40px auto;
            padding: 40px;
            background: rgba(26, 26, 26, 0.95);
            border: 1px solid #333;
            position: relative;
            z-index: 10;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        h1 { font-family: 'Metal Mania'; color: var(--rojo); font-size: 2.5rem; text-align: center; }
        
        .campo { margin-bottom: 20px; }
        label { display: block; color: var(--rojo); font-weight: bold; margin-bottom: 8px; font-size: 0.9rem; }
        input, textarea, select { width: 100%; padding: 12px; background: #000; border: 1px solid #444; color: white; font-family: 'Oswald'; }

        .btn-enviar {
            width: 100%; padding: 15px; background: var(--rojo); color: white; border: none;
            font-weight: bold; font-size: 1.2rem; cursor: pointer;
        }


        #capa-niebla {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particula-humo {
            position: absolute;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
            border-radius: 50%;
            /* El truco del rendimiento: */
            will-change: transform, opacity;
            opacity: 0;
            animation: movimientoHumo var(--duracion) infinite linear;
        }

        @keyframes movimientoHumo {
            0% { transform: translate(0, 0) scale(1); opacity: 0; }
            20% { opacity: 0.4; }
            80% { opacity: 0.4; }
            100% { transform: translate(var(--mov-x), var(--mov-y)) scale(2); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="capa-niebla"></div>

    <nav>
        <a href="index.html" class="logo">VOCES <span>ANCESTRALES</span></a>
    </nav>

    <div class="contenedor-form">
        <h1>REPORTE DE SUCESOS</h1>
        <br>
        <form action="https://formspree.io/f/xgorzeej" method="POST">
            <div class="campo">
                <label>Nombre del Informante</label>
                <input type="text" name="nombre" required>
            </div>
            <div class="campo">
                <label>Correo de Contacto</label>
                <input type="email" name="email" required>
            </div>
            <div class="campo">
                <label>Tipo de Fenómeno</label>
                <select name="categoria">
                    <option value="aparicion">Aparición Espectral</option>
                    <option value="leyenda">Leyenda Local</option>
                </select>
            </div>
            <div class="campo">
                <label>Relato de los Hechos</label>
                <textarea name="mensaje" rows="5" required></textarea>
            </div>
            <button type="submit" class="btn-enviar">REGISTRAR EN EL ARCHIVO</button>
        </form>
    </div>

    <script>
        const capa = document.getElementById('capa-niebla');

        const cantidadParticulas = 25; 

        for (let i = 0; i < cantidadParticulas; i++) {
            const humo = document.createElement('div');
            humo.className = 'particula-humo';
            
            const tamaño = Math.random() * 600 + 500;
            humo.style.width = tamaño + 'px';
            humo.style.height = tamaño + 'px';
            
            humo.style.left = Math.random() * 100 + 'vw';
            humo.style.top = Math.random() * 100 + 'vh';
            
            humo.style.setProperty('--duracion', Math.random() * 20 + 15 + 's');
            humo.style.setProperty('--mov-x', (Math.random() * 200 - 100) + 'px');
            humo.style.setProperty('--mov-y', (Math.random() * -200 - 100) + 'px');
            
            humo.style.animationDelay = Math.random() * 10 + 's';

            capa.appendChild(humo);
        }
    </script>
</body>
</html>
